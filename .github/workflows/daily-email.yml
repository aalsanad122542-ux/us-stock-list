name: Daily Stock Email

on:
  workflow_dispatch:  # Manual trigger only

jobs:
  send-email:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install google-generativeai python-dotenv schedule

      - name: Update .env with secrets
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: |
          # Update .env with secrets (only update password if secret exists)
          if [ -n "$SENDER_PASSWORD" ]; then
            sed -i "s/SENDER_PASSWORD=.*/SENDER_PASSWORD=$SENDER_PASSWORD/" .env
          fi
          if [ -n "$GEMINI_API_KEY" ]; then
            sed -i "s/GEMINI_API_KEY=.*/GEMINI_API_KEY=$GEMINI_API_KEY/" .env
          fi
          cat .env

      - name: Run daily analysis
        run: |
          python run_github_action.py 2>&1 | tee output.log

      - name: Upload output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: workflow-output
          path: output.log
          retention-days: 1
